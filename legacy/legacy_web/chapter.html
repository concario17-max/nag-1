    <script>
        (function () {
            try {
                var p = '0228';
                var l = localStorage.getItem('yoga_gate_auth');
                var c = document.cookie.split('; ').find(function (r) { return r.trim().startsWith('yoga_gate_auth=') });
                var cv = c ? c.split('=')[1] : null;
                if (l === p || cv === p) {
                    var g = document.getElementById('password-gate');
                    if (g) { g.style.display = 'none'; g.classList.add('hidden'); }
                    document.body.classList.remove('overflow-hidden');
                    var ctt = document.getElementById('app-wrapper') || document.getElementById('main-content') || document.getElementById('landing-page');
                    if (ctt) { ctt.classList.remove('invisible'); ctt.classList.add('opacity-100'); }
                }
            } catch (e) { }
        })();
    </script>

            const sutraCountsCustom = {
                '1': 51,
                '2': 55,
                '3': 56,
                '4': 34
            };

            let activeTopChapter = null;
            let activeTopSutra = null;

            document.addEventListener('DOMContentLoaded', () => {
                const urlParams = new URLSearchParams(window.location.search);
                activeTopChapter = urlParams.get('chapter') || urlParams.get('id') || '1';
                activeTopSutra = urlParams.get('sutra') || '1';
                if (activeTopSutra.includes('.')) {
                    activeTopSutra = activeTopSutra.split('.')[1];
                }

                const chapDisplay = document.getElementById('top-chap-display');
                if (chapDisplay) chapDisplay.textContent = activeTopChapter + '장';

                const sutraDisplay = document.getElementById('top-sutra-display');
                if (sutraDisplay) sutraDisplay.textContent = activeTopSutra;

                generateTopSutraOptions(activeTopChapter);
            });

            function toggleTopDropdown(event, id) {
                event.stopPropagation();
                const el = document.getElementById(id);
                const isVisible = !el.classList.contains('invisible');

                closeAllTopDropdowns();

                if (!isVisible) {
                    el.classList.remove('invisible', 'opacity-0', 'scale-95');
                    el.classList.add('opacity-100', 'scale-100');
                }
            }

            function closeAllTopDropdowns() {
                const d1 = document.getElementById('top-chap-dropdown');
                const d2 = document.getElementById('top-verse-dropdown');
                if (d1) { d1.classList.add('invisible', 'opacity-0', 'scale-95'); d1.classList.remove('opacity-100', 'scale-100'); }
                if (d2) { d2.classList.add('invisible', 'opacity-0', 'scale-95'); d2.classList.remove('opacity-100', 'scale-100'); }
            }

            function selectTopChapter(event, chapterId, chapterName) {
                event.stopPropagation();
                if (activeTopChapter === chapterId) {
                    closeAllTopDropdowns();
                    return;
                }

                activeTopChapter = chapterId;
                const chapDisplay = document.getElementById('top-chap-display');
                if (chapDisplay) chapDisplay.textContent = chapterName;

                generateTopSutraOptions(chapterId);

                const sutraDisplay = document.getElementById('top-sutra-display');
                if (sutraDisplay) sutraDisplay.textContent = '1';

                closeAllTopDropdowns();

                if (window.loadSutra) window.loadSutra(`${chapterId}.1`);
            }

            function generateTopSutraOptions(chapterId) {
                const container = document.getElementById('top-sutra-options-container');
                if (!container) return;
                container.innerHTML = '';

                const count = sutraCountsCustom[chapterId];
                for (let i = 1; i <= count; i++) {
                    const opt = document.createElement('div');
                    opt.className = 'px-4 py-3 hover:bg-[#FAF8F5] dark:hover:bg-white/5 cursor-pointer text-ink dark:text-gray-200 font-serif text-[14px] border-b border-primary/10 last:border-0 transition-colors text-center';
                    opt.textContent = i;
                    opt.onclick = (e) => selectTopSutra(e, i);
                    container.appendChild(opt);
                }
            }

            function selectTopSutra(event, sutraId) {
                event.stopPropagation();
                if (activeTopSutra === sutraId.toString()) {
                    closeAllTopDropdowns();
                    return;
                }

                activeTopSutra = sutraId.toString();
                const sutraDisplay = document.getElementById('top-sutra-display');
                if (sutraDisplay) sutraDisplay.textContent = activeTopSutra;

                closeAllTopDropdowns();
                if (window.loadSutra) window.loadSutra(`${activeTopChapter}.${activeTopSutra}`);
            }

            document.addEventListener('click', closeAllTopDropdowns);
        </script>
</body>

</html>
